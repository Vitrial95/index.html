<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Monitor Global 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }

        /* Estilo de las Text Boxes (Dialogue Bubbles) */
        .agro-dialog-box {
            background: rgba(255, 252, 240, 0.95); /* Color crema papel */
            border: 2px solid #d4af37; /* Oro viejo */
            border-radius: 12px;
            padding: 15px;
            color: #2c2c2c;
            min-width: 220px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            pointer-events: none;
            position: relative;
        }

        /* Flechita del globo de texto */
        .agro-dialog-box::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #d4af37;
        }

        .agro-dialog-box h3 { 
            margin: 0 0 10px 0; 
            font-family: 'Playfair Display', serif; 
            color: #5d4037; 
            border-bottom: 1px solid #d4af37;
            font-size: 20px;
            text-transform: uppercase;
        }

        .comm-item { margin-bottom: 10px; }
        .comm-name { font-weight: bold; color: #2e7d32; display: block; font-size: 14px; }
        .client-info { font-size: 12px; color: #555; line-height: 1.4; }
        .client-info b { color: #333; }
    </style>
</head>
<body>

<div id="globeViz"></div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
    // Configuración de Datos Agro
    const agroData = {
        "Brazil": [
            { prod: "Azúcar", clientes: "China, Argelia", lider: "Raízen" },
            { prod: "Café", clientes: "EE.UU., Alemania", lider: "Cooxupé" }
        ],
        "Argentina": [
            { prod: "Soja", clientes: "China, India", lider: "Vicentín" },
            { prod: "Azúcar", clientes: "Mercado Interno, Chile", lider: "Ledesma" }
        ],
        "Colombia": [
            { prod: "Café", clientes: "Japón, EE.UU.", lider: "Fed. Cafeteros" },
            { prod: "Azúcar", clientes: "Europa", lider: "Manuelita" }
        ],
        "Mexico": [
            { prod: "Azúcar", clientes: "EE.UU.", lider: "Zucarmex" },
            { prod: "Aguacate", clientes: "Canadá, Japón", lider: "Apeam" }
        ]
    };

    const world = Globe()(document.getElementById('globeViz'))
        // --- TEXTURAS 3D (Como la foto que mandaste) ---
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
        .nightImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        
        // --- AUREOLA AMARILLA LEVE ---
        .showAtmosphere(true)
        .atmosphereColor('#ffecb3') 
        .atmosphereAltitude(0.15)
        
        // --- ESTILO DE PAÍSES ---
        .polygonCapColor(d => {
            const name = d.properties.name || d.properties.NAME || d.properties.admin;
            return agroData[name] ? 'rgba(212, 175, 55, 0.3)' : 'rgba(0,0,0,0)';
        })
        .polygonStrokeColor(d => {
            const name = d.properties.name || d.properties.NAME || d.properties.admin;
            return agroData[name] ? '#d4af37' : 'rgba(255,255,255,0.05)';
        })
        .polygonStrokeWidth(1.2)

        // --- LAS TEXT BOXES (Dialogue Bubbles) ---
        .polygonLabel(d => {
            const name = d.properties.name || d.properties.NAME || d.properties.admin;
            if (!agroData[name]) return null;

            const content = agroData[name].map(item => `
                <div class="comm-item">
                    <span class="comm-name">🌿 ${item.prod}</span>
                    <div class="client-info">
                        <b>Clientes:</b> ${item.clientes}<br>
                        <b>Líder:</b> ${item.lider}
                    </div>
                </div>
            `).join('');

            return `
                <div class="agro-dialog-box">
                    <h3>${name}</h3>
                    ${content}
                </div>
            `;
        });

    // Carga del mapa (Usando CDN de GitHub para máxima compatibilidad)
    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(res => res.json())
        .then(countries => {
            world.polygonsData(countries.features);
        })
        .catch(err => console.error("Error al cargar el mapa:", err));

    // Controles y Cámara
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.4;
    world.controls().enableDamping = true;
    
    // Posición inicial sobre LATAM
    world.pointOfView({ lat: 10, lng: -65, altitude: 2.2 });
</script>
</body>
</html>
