<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>Agro-Tech Global Monitor</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap");

        body { margin: 0; overflow: hidden; background: #000500; font-family: 'Orbitron', sans-serif; color: #e0f2f1; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }

        /* Panel Lateral - Estilo Agro Dashboard */
        #side-panel {
            position: absolute;
            top: 20px;
            right: -350px;
            width: 280px;
            height: calc(100vh - 60px);
            background: rgba(0, 15, 10, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #00ff96;
            border-radius: 12px;
            padding: 25px;
            transition: right 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1000;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0, 255, 150, 0.2);
        }
        #side-panel.open { right: 20px; }
        .close-btn { cursor: pointer; color: #00ff96; float: right; font-size: 24px; line-height: 1; }
        
        /* Tooltips Minimalistas */
        .scene-tooltip {
            background: rgba(0, 8, 5, 0.95);
            border: 1px solid #fbff00;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(251, 255, 0, 0.2);
        }
        .tt-country { font-weight: 700; color: #00ff96; border-bottom: 1px solid #333; margin-bottom: 6px; font-size: 14px; }
        .tt-comm { font-size: 12px; color: #fff; display: block; margin: 2px 0; }

        /* Contenido del Panel */
        h2 { font-size: 22px; color: #00ff96; margin-top: 0; border-bottom: 2px solid #004d40; padding-bottom: 10px; }
        .comm-title { font-weight: bold; color: #fbff00; font-size: 14px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .entity-list { list-style: none; padding: 0; font-family: 'Inter', sans-serif; font-size: 13px; margin-top: 10px; }
        .entity-list li { padding: 6px 0; color: #b2dfdb; border-bottom: 1px solid rgba(0, 255, 150, 0.1); }
        .entity-list li:before { content: "› "; color: #fbff00; font-weight: bold; }
    </style>
</head>
<body>

<div id="side-panel">
    <span class="close-btn" onclick="togglePanel()">×</span>
    <div id="panel-content">
        <p style="color: #4db6ac; font-family: 'Inter';">Selecciona un país resaltado en el globo para ver el despliegue de commodities y entidades bancarias/ingenios.</p>
    </div>
</div>

<div id="globeViz"></div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
    // 1. BASE DE DATOS ESTRUCTURADA
    const agroData = {
        "Brazil": { 
            comms: [
                { n: "Azúcar", e: ["Raízen", "Copersucar", "Tereos", "Bunge", "Santander Agro"] },
                { n: "Café", e: ["Cooxupé", "Ipanema Coffees", "Louis Dreyfus Company"] },
                { n: "Soja", e: ["Amaggi", "Cargill", "Banco do Brasil"] }
            ] 
        },
        "Argentina": { 
            comms: [
                { n: "Soja", e: ["Vicentin", "LDC Argentina", "Bunge Argentina", "Banco Nación"] },
                { n: "Maíz", e: ["Cargill", "ACA", "AFA"] },
                { n: "Azúcar", e: ["Ingenio Ledesma", "Ingenio Concepción", "Banco Macro"] }
            ] 
        },
        "Colombia": { 
            comms: [
                { n: "Café", e: ["Federación Nal de Cafeteros", "Bancolombia", "Trilladora Andes"] },
                { n: "Azúcar", e: ["Ingenio Manuelita", "Riopaila Castilla", "Mayagüez"] }
            ] 
        },
        "Mexico": { 
            comms: [
                { n: "Azúcar", e: ["Zucarmex", "Beta San Miguel", "FIRA", "Grupo Porres"] },
                { n: "Maíz", e: ["Gruma", "Cargill Mexico", "Maseca"] }
            ] 
        }
    };

    const latamNames = Object.keys(agroData);

    // 2. CONFIGURACIÓN DEL GLOBO
    const globe = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000500')
        .showAtmosphere(true)
        .atmosphereColor('#00ff96')
        .atmosphereAltitude(0.18)
        
        // Estética de Polígonos (Países)
        .polygonCapColor(d => latamNames.includes(d.properties.name) ? 'rgba(0, 255, 150, 0.2)' : 'rgba(0,0,0,0)')
        .polygonSideColor(() => 'rgba(0, 100, 50, 0.1)')
        .polygonStrokeColor(d => latamNames.includes(d.properties.name) ? '#00ff96' : 'rgba(255,255,255,0.03)')
        .polygonStrokeWidth(d => latamNames.includes(d.properties.name) ? 1.5 : 0.3)
        
        // Efecto Hover
        .onPolygonHover(hoverD => {
            document.body.style.cursor = hoverD && latamNames.includes(hoverD.properties.name) ? 'pointer' : 'default';
        })
        
        // Tooltip Innovador
        .polygonLabel(d => {
            const country = d.properties.name;
            if (!agroData[country]) return null;
            return `
                <div class="scene-tooltip">
                    <div class="tt-country">${country.toUpperCase()}</div>
                    ${agroData[country].comms.map(c => `<span class="tt-comm">🌿 ${c.n}</span>`).join('')}
                    <div style="font-size:9px; color:#fbff00; margin-top:8px; font-family:Orbitron;">[ CLICK PARA DETALLES ]</div>
                </div>`;
        })
        
        // Acción de Click
        .onPolygonClick(d => {
            const country = d.properties.name;
            if (agroData[country]) {
                showPanel(country, agroData[country]);
                globe.pointOfView({ lat: d.bbox[1], lng: d.bbox[0], altitude: 2 }, 1000);
            }
        });

    // 3. CARGA DE GEOMETRÍA (CDN de alta disponibilidad)
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(res => res.json())
        .then(data => {
            // Convertimos TopoJSON a GeoJSON (más compatible con CSP)
            const countries = topojson.feature(data, data.objects.countries).features;
            globe.polygonsData(countries);
        })
        .catch(err => {
            console.error("Error cargando mapa:", err);
            // Fallback por si falla el CDN
            alert("Error de conexión con el mapa. Verifica tu conexión o el CSP.");
        });

    // 4. FUNCIONES DE INTERFAZ (UI)
    function showPanel(name, data) {
        const panel = document.getElementById('side-panel');
        const content = document.getElementById('panel-content');
        
        let html = `<h2>${name}</h2>`;
        data.comms.forEach(c => {
            html += `
                <div class="comm-title">${c.n}</div>
                <ul class="entity-list">
                    ${c.e.map(ent => `<li>${ent}</li>`).join('')}
                </ul>`;
        });
        
        content.innerHTML = html;
        panel.classList.add('open');
    }

    function togglePanel() {
        document.getElementById('side-panel').classList.remove('open');
    }

    // Configuración de controles
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.5;
    globe.controls().enableDamping = true;

</script>
<script src="https://unpkg.com/topojson-client@3"></script>
</body>
</html>
