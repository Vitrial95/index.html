<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Agro-Tech Global Monitor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000a05; font-family: 'Orbitron', sans-serif; color: #e0f2f1; }
        #globeViz { width: 100vw; height: 100vh; }
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap");

        #side-panel {
            position: absolute;
            top: 20px;
            right: -350px;
            width: 300px;
            height: calc(100vh - 40px);
            background: rgba(0, 20, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.5s ease;
            z-index: 100;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #side-panel.open { right: 20px; }
        .close-btn { cursor: pointer; color: #00ff96; float: right; font-family: sans-serif; }
        
        .scene-tooltip {
            background: rgba(0, 10, 5, 0.95);
            border: 1px solid #00ff96;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
        }
        .tt-country { font-weight: bold; color: #00ff96; border-bottom: 1px solid #333; margin-bottom: 5px; text-transform: uppercase; }
        .tt-commodity { font-size: 11px; color: #fff; display: block; margin: 2px 0; }

        h2 { font-size: 18px; margin-top: 0; color: #00ff96; border-bottom: 2px solid #004d40; padding-bottom: 10px; }
        .commodity-title { font-weight: bold; color: #fbff00; font-size: 14px; margin-top: 15px; }
        .entity-list { list-style: none; padding: 0; font-family: 'Inter', sans-serif; font-size: 13px; }
        .entity-list li { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #b2dfdb; }
    </style>
</head>
<body>

<div id="side-panel">
    <span class="close-btn" onclick="togglePanel()">✕</span>
    <div id="panel-content">
        <p>Selecciona un país resaltado para ver detalles.</p>
    </div>
</div>

<div id="globeViz"></div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
    // 1. Datos de Commodities
    const agroData = {
        "Brazil": { commodities: [{ name: "Azúcar", entities: ["Raízen", "Copersucar", "Bunge"] }, { name: "Café", entities: ["Cooxupé", "Ipanema"] }] },
        "Argentina": { commodities: [{ name: "Soja", entities: ["Vicentin", "LDC", "Bunge"] }, { name: "Azúcar", entities: ["Ledesma", "Concepción"] }] },
        "Colombia": { commodities: [{ name: "Café", entities: ["Fed. Cafeteros", "Bancolombia"] }, { name: "Azúcar", entities: ["Manuelita", "Mayagüez"] }] },
        "Mexico": { commodities: [{ name: "Azúcar", entities: ["Zucarmex", "Beta San Miguel"] }] }
    };

    const latamKeys = Object.keys(agroData);

    // 2. Inicializar el Globo
    const globe = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000a05')
        .showAtmosphere(true)
        .atmosphereColor('#00ff96')
        .atmosphereAltitude(0.1)
        
        // Estilo de los Polígonos
        .polygonCapColor(d => latamKeys.includes(d.properties.NAME) ? 'rgba(0, 255, 150, 0.2)' : 'rgba(0,0,0,0)')
        .polygonSideColor(() => 'rgba(0, 100, 50, 0.3)')
        .polygonStrokeColor(d => latamKeys.includes(d.properties.NAME) ? '#00ff96' : 'rgba(255,255,255,0.05)')
        .polygonStrokeWidth(d => latamKeys.includes(d.properties.NAME) ? 1 : 0.1)
        
        // Tooltip
        .polygonLabel(d => {
            const country = d.properties.NAME;
            if (!agroData[country]) return null;
            return `
                <div class="scene-tooltip">
                    <div class="tt-country">${country}</div>
                    ${agroData[country].commodities.map(c => `<span class="tt-commodity">🌿 ${c.name}</span>`).join('')}
                </div>`;
        })
        
        // Click
        .onPolygonClick(d => {
            const country = d.properties.NAME;
            if (agroData[country]) {
                showPanel(country, agroData[country]);
                globe.pointOfView({ lat: d.properties.LAT, lng: d.properties.LON, altitude: 2 }, 1000);
            }
        });

    // 3. Cargar Geometría (Usando un GeoJSON más directo)
    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(res => res.json())
        .then(countries => {
            // Ajustamos los nombres para que coincidan con nuestra base de datos si es necesario
            globe.polygonsData(countries.features);
        });

    // 4. UI Functions
    function showPanel(name, data) {
        const panel = document.getElementById('side-panel');
        const content = document.getElementById('panel-content');
        let html = `<h2>${name}</h2>`;
        data.commodities.forEach(c => {
            html += `
                <div class="commodity-title">${c.name.toUpperCase()}</div>
                <ul class="entity-list">${c.entities.map(e => `<li>${e}</li>`).join('')}</ul>
            `;
        });
        content.innerHTML = html;
        panel.classList.add('open');
    }

    function togglePanel() {
        document.getElementById('side-panel').classList.remove('open');
    }

    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.5;
</script>
</body>
</html>
