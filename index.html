<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>Agro-Tech Global Monitor</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap");
        body { margin: 0; overflow: hidden; background: #000500; font-family: 'Orbitron', sans-serif; color: #e0f2f1; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #side-panel {
            position: absolute; top: 20px; right: -350px; width: 280px; height: calc(100vh - 60px);
            background: rgba(0, 15, 10, 0.9); backdrop-filter: blur(12px); border: 1px solid #00ff96;
            border-radius: 12px; padding: 25px; transition: right 0.6s ease; z-index: 1000; overflow-y: auto;
        }
        #side-panel.open { right: 20px; }
        .close-btn { cursor: pointer; color: #00ff96; float: right; font-size: 24px; }
        .scene-tooltip {
            background: rgba(0, 8, 5, 0.95); border: 1px solid #fbff00; border-radius: 4px;
            padding: 10px; font-family: 'Inter', sans-serif; pointer-events: none;
        }
        .tt-country { font-weight: 700; color: #00ff96; border-bottom: 1px solid #333; margin-bottom: 6px; }
        .tt-comm { font-size: 12px; color: #fff; display: block; }
        .comm-title { font-weight: bold; color: #fbff00; font-size: 14px; margin-top: 20px; text-transform: uppercase; }
        .entity-list { list-style: none; padding: 0; font-size: 13px; margin-top: 10px; font-family: 'Inter'; }
        .entity-list li { padding: 4px 0; color: #b2dfdb; border-bottom: 1px solid rgba(0, 255, 150, 0.1); }
    </style>
</head>
<body>

<div id="side-panel">
    <span class="close-btn" onclick="togglePanel()">×</span>
    <div id="panel-content">
        <p>Selecciona un país (Brasil, Argentina, Colombia o México) para ver detalles.</p>
    </div>
</div>

<div id="globeViz"></div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
    // 1. DATA - Mantenemos los nombres estándar
    const agroData = {
        "Brazil": { comms: [{ n: "Azúcar", e: ["Raízen", "Copersucar", "Bunge"] }, { n: "Café", e: ["Cooxupé", "Ipanema"] }] },
        "Argentina": { comms: [{ n: "Soja", e: ["Vicentin", "LDC", "Cargill"] }, { n: "Azúcar", e: ["Ledesma", "Concepción"] }] },
        "Colombia": { comms: [{ n: "Café", e: ["Fed. Cafeteros", "Bancolombia"] }, { n: "Azúcar", e: ["Manuelita", "Mayagüez"] }] },
        "Mexico": { comms: [{ n: "Azúcar", e: ["Zucarmex", "Beta San Miguel"] }] }
    };

    const latamNames = Object.keys(agroData);

    const globe = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png') // Agregamos relieve
        .backgroundColor('#000500')
        .showAtmosphere(true)
        .atmosphereColor('#00ff96')
        .atmosphereAltitude(0.15)
        
        // --- LOGICA DE POLIGONOS CORREGIDA ---
        .polygonCapColor(d => {
            const name = d.properties.NAME || d.properties.name || d.properties.admin;
            return latamNames.includes(name) ? 'rgba(0, 255, 150, 0.35)' : 'rgba(0,0,0,0)';
        })
        .polygonStrokeColor(d => {
            const name = d.properties.NAME || d.properties.name || d.properties.admin;
            return latamNames.includes(name) ? '#00ff96' : 'rgba(255,255,255,0.05)';
        })
        .polygonStrokeWidth(d => {
            const name = d.properties.NAME || d.properties.name || d.properties.admin;
            return latamNames.includes(name) ? 1.5 : 0.1;
        })
        .polygonLabel(d => {
            const name = d.properties.NAME || d.properties.name || d.properties.admin;
            if (!agroData[name]) return null;
            return `
                <div class="scene-tooltip">
                    <div class="tt-country">${name.toUpperCase()}</div>
                    ${agroData[name].comms.map(c => `<span class="tt-comm">🌿 ${c.n}</span>`).join('')}
                </div>`;
        })
        .onPolygonClick(d => {
            const name = d.properties.NAME || d.properties.name || d.properties.admin;
            if (agroData[name]) {
                showPanel(name, agroData[name]);
                globe.pointOfView({ lat: d.bbox ? (d.bbox[1] + d.bbox[3])/2 : 0, lng: d.bbox ? (d.bbox[0] + d.bbox[2])/2 : 0, altitude: 2 }, 1000);
            }
        });

    // Usamos un GeoJSON más estándar para evitar errores de propiedades
    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
        .then(res => res.json())
        .then(countries => {
            console.log("Países cargados:", countries.features[0].properties); // Debug para ver las propiedades en consola
            globe.polygonsData(countries.features);
        });

    function showPanel(name, data) {
        const panel = document.getElementById('side-panel');
        const content = document.getElementById('panel-content');
        let html = `<h2>${name}</h2>`;
        data.comms.forEach(c => {
            html += `<div class="comm-title">${c.n}</div><ul class="entity-list">${c.e.map(ent => `<li>${ent}</li>`).join('')}</ul>`;
        });
        content.innerHTML = html;
        panel.classList.add('open');
    }

    function togglePanel() { document.getElementById('side-panel').classList.remove('open'); }

    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.5;
</script>
</body>
</html>
